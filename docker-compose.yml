services:
  dashboard:
    build: .
    ports:
      - "5001:5000"                  # 5001 locally so it doesn't clash with local dev on 5000
    env_file: .env
    environment:
      - CACHE_PATH=/data/pr_cache.json
      - LOG_TO_STDOUT=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app                       # bind mount: local edits sync instantly
      - cache_data:/data             # persistent cache (separate from local pr_cache.json)
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync               # file changes → live sync (covered by bind mount too)
          path: .
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - pr_cache.json
            - server.log
        - action: rebuild            # dependency changes → full rebuild
          path: requirements.txt

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"                  # expose for local debugging; remove in production
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --dir /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  cache_data:
  redis_data:
